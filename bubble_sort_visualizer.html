<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bubble Sort Visualizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
      color: #ffffff;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 2rem;
      font-family: monospace;
    }

    .container {
      width: 100%;
      max-width: 860px;
    }

    /* --- Stats --- */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 0.9rem 1.1rem;
    }

    .stat-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .stat-val {
      font-size: 26px;
      font-weight: 600;
      font-family: monospace;
      color: #ffffff;
    }

    /* --- Controls --- */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    button {
      background: #1e2130;
      color: #e0e0e0;
      border: 1px solid #3a3d4e;
      border-radius: 8px;
      padding: 0.5rem 1.1rem;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover:not(:disabled) { background: #2a2e42; border-color: #5a5d6e; }
    button:active:not(:disabled) { transform: scale(0.97); }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    button.primary {
      background: #2563eb;
      border-color: #3b82f6;
      color: #fff;
      font-weight: 500;
    }

    button.primary:hover:not(:disabled) { background: #1d4ed8; }

    .slider-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #888;
    }

    input[type=range] {
      width: 90px;
      accent-color: #2563eb;
    }

    .slider-val {
      font-family: monospace;
      font-size: 13px;
      color: #ccc;
      min-width: 22px;
    }

    /* --- Bars --- */
    #bars-wrap {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 220px;
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 12px 12px 0;
      margin-bottom: 1rem;
    }

    .bar {
      flex: 1;
      border-radius: 3px 3px 0 0;
      min-width: 6px;
      transition: height 0.12s ease, background 0.1s ease;
    }

    .bar.normal  { background: #2563eb; }
    .bar.active  { background: #ef4444; }
    .bar.sorted  { background: #22c55e; }

    /* --- Status --- */
    #status {
      font-size: 13px;
      color: #888;
      font-family: monospace;
      min-height: 1.4rem;
      margin-bottom: 1rem;
      padding-left: 2px;
    }

    /* --- Pass dots --- */
    #pass-wrap {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .pass-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2a2d3a;
      transition: background 0.25s;
    }

    .pass-dot.done    { background: #22c55e; }
    .pass-dot.current { background: #ef4444; }

    /* --- Legend --- */
    .legend {
      display: flex;
      gap: 18px;
      font-size: 12px;
      color: #888;
    }

    .legend span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }
  </style>
</head>
<body>

  <h1>Bubble Sort Visualizer</h1>
  <p class="subtitle">O(n²) worst case &nbsp;·&nbsp; O(n) best case (early exit)</p>

  <div class="container">

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Comparisons</div>
        <div class="stat-val" id="cmp-count">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Swaps</div>
        <div class="stat-val" id="swap-count">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Pass</div>
        <div class="stat-val" id="pass-count">0 / 0</div>
      </div>
    </div>

    <div class="controls">
      <button class="primary" id="btn-start">&#9654; Run sort</button>
      <button id="btn-reset">&#8635; New array</button>
      <button id="btn-step" disabled>&#8594; Step</button>

      <div class="slider-group">
        Speed
        <input type="range" id="speed" min="1" max="10" value="5">
        <span class="slider-val" id="speed-out">5</span>
      </div>

      <div class="slider-group">
        Size
        <input type="range" id="size" min="5" max="40" value="14">
        <span class="slider-val" id="size-out">14</span>
      </div>
    </div>

    <div id="bars-wrap"></div>
    <div id="status">Press "Run sort" to begin.</div>
    <div id="pass-wrap"></div>

    <div class="legend">
      <span><span class="dot" style="background:#2563eb"></span>Unsorted</span>
      <span><span class="dot" style="background:#ef4444"></span>Comparing</span>
      <span><span class="dot" style="background:#22c55e"></span>Sorted</span>
    </div>

  </div>

  <script>
    (function () {
      let arr = [], sortedFrom = Infinity;
      let running = false, paused = false, stepResolve = null;
      let cmps = 0, swaps = 0, pass = 0, totalPasses = 0;

      const wrap      = document.getElementById('bars-wrap');
      const status    = document.getElementById('status');
      const cmpEl     = document.getElementById('cmp-count');
      const swapEl    = document.getElementById('swap-count');
      const passEl    = document.getElementById('pass-count');
      const passWrap  = document.getElementById('pass-wrap');
      const speedEl   = document.getElementById('speed');
      const speedOut  = document.getElementById('speed-out');
      const sizeEl    = document.getElementById('size');
      const sizeOut   = document.getElementById('size-out');
      const btnStart  = document.getElementById('btn-start');
      const btnReset  = document.getElementById('btn-reset');
      const btnStep   = document.getElementById('btn-step');

      function delay() {
        return new Promise(r => setTimeout(r, Math.round(550 / parseInt(speedEl.value))));
      }

      function renderBars(h1 = -1, h2 = -1) {
        wrap.innerHTML = '';
        const maxV = Math.max(...arr);
        arr.forEach((v, i) => {
          const b = document.createElement('div');
          const cls = i >= sortedFrom ? 'sorted' : (i === h1 || i === h2 ? 'active' : 'normal');
          b.className = 'bar ' + cls;
          b.style.height = Math.round((v / maxV) * 195) + 'px';
          b.title = 'Value: ' + v;
          wrap.appendChild(b);
        });
      }

      function buildPasses() {
        passWrap.innerHTML = '';
        for (let i = 0; i < totalPasses; i++) {
          const d = document.createElement('div');
          d.className = 'pass-dot';
          d.id = 'pd-' + i;
          passWrap.appendChild(d);
        }
      }

      function updatePasses(p) {
        for (let i = 0; i < totalPasses; i++) {
          const d = document.getElementById('pd-' + i);
          if (!d) continue;
          d.className = 'pass-dot ' + (i < p ? 'done' : i === p ? 'current' : '');
        }
      }

      function generate() {
        const n = parseInt(sizeEl.value);
        arr = Array.from({ length: n }, () => Math.floor(Math.random() * 40) + 4);
        sortedFrom = Infinity;
        cmps = 0; swaps = 0; pass = 0;
        totalPasses = n - 1;
        buildPasses();
        renderBars();
        status.textContent = 'Array ready. Press "Run sort" to begin.';
        cmpEl.textContent = '0';
        swapEl.textContent = '0';
        passEl.textContent = '0 / ' + (n - 1);
        btnStart.textContent = '▶ Run sort';
        btnStart.disabled = false;
        btnStep.disabled = true;
      }

      async function waitStep() {
        if (!paused) return;
        return new Promise(r => { stepResolve = r; });
      }

      async function bubbleSort() {
        const n = arr.length;
        running = true;
        btnStart.textContent = '⏸ Pause';
        btnStep.disabled = true;

        for (let i = 0; i < n - 1; i++) {
          pass = i;
          updatePasses(i);
          passEl.textContent = (i + 1) + ' / ' + (n - 1);
          let swappedThisPass = false;

          for (let j = 0; j < n - i - 1; j++) {
            await waitStep();
            cmps++;
            cmpEl.textContent = cmps;
            status.textContent = 'Comparing index ' + j + ' (' + arr[j] + ') and ' + (j + 1) + ' (' + arr[j + 1] + ')';
            renderBars(j, j + 1);
            await delay();

            if (arr[j] > arr[j + 1]) {
              swaps++;
              swapEl.textContent = swaps;
              status.textContent = 'Swapping ' + arr[j] + ' ↔ ' + arr[j + 1];
              [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
              swappedThisPass = true;
              renderBars(j, j + 1);
              await delay();
            }
          }

          sortedFrom = n - i - 1;
          renderBars();

          // Early exit optimisation — best case O(n)
          if (!swappedThisPass) {
            status.textContent = 'No swaps this pass — array already sorted! Early exit triggered.';
            break;
          }
        }

        sortedFrom = 0;
        renderBars();
        updatePasses(totalPasses);
        status.textContent = '✓ Sorted in ' + cmps + ' comparisons and ' + swaps + ' swaps.';
        running = false;
        paused = false;
        btnStart.textContent = '▶ Run sort';
        btnStart.disabled = true;
        btnStep.disabled = true;
      }

      btnStart.addEventListener('click', () => {
        if (!running) {
          generate();
          setTimeout(() => bubbleSort(), 60);
        } else if (paused) {
          paused = false;
          btnStart.textContent = '⏸ Pause';
          btnStep.disabled = true;
          if (stepResolve) { stepResolve(); stepResolve = null; }
        } else {
          paused = true;
          btnStart.textContent = '▶ Resume';
          btnStep.disabled = false;
        }
      });

      btnStep.addEventListener('click', () => {
        if (paused && stepResolve) {
          const r = stepResolve;
          stepResolve = null;
          r();
        }
      });

      btnReset.addEventListener('click', () => {
        running = false;
        paused = false;
        stepResolve = null;
        generate();
      });

      speedEl.addEventListener('input', () => { speedOut.textContent = speedEl.value; });
      sizeEl.addEventListener('input', () => {
        sizeOut.textContent = sizeEl.value;
        if (!running) generate();
      });

      generate();
    })();
  </script>

</body>
</html>
